name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57

      - name: Restore benchmark data cache
        id: cache-data
        uses: actions/cache@v5
        with:
          path: .benchmark_data
          key: benchmark-data-${{ hashFiles('scripts/prepare_benchmark_data.py') }}
          restore-keys: |
            benchmark-data-

      - name: Prepare benchmark data
        run: uv run python scripts/prepare_benchmark_data.py

      - name: Restore baseline cache (PR only)
        id: cache-baseline
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: .benchmarks
          key: benchmark-baseline-${{ github.sha }}
          restore-keys: |
            benchmark-baseline-

      - name: Check whether a baseline exists
        id: baseline-check
        if: github.event_name == 'pull_request'
        run: |
          BASELINE=".benchmarks/Linux-CPython-3.13-64bit/0001_main.json"
          if [ -f "$BASELINE" ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No main baseline found — comparison skipped for this PR."
          fi

      - name: Run benchmarks (main)
        if: github.event_name == 'push'
        run: |
          uv run pytest tests/benchmarks/ \
            --benchmark-enable \
            --benchmark-save=main \
            --benchmark-storage=.benchmarks \
            -v

      - name: Save baseline cache (main only)
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: .benchmarks
          key: benchmark-baseline-${{ github.sha }}

      - name: Run benchmarks (PR — compare against baseline)
        if: >
          github.event_name == 'pull_request' &&
          steps.baseline-check.outputs.has_baseline == 'true'
        run: |
          uv run pytest tests/benchmarks/ \
            --benchmark-enable \
            --benchmark-save=pr-${{ github.sha }} \
            --benchmark-storage=.benchmarks \
            --benchmark-compare='*_main' \
            --benchmark-compare-fail=mean:20% \
            -v

      - name: Post benchmark comparison comment
        if: >
          github.event_name == 'pull_request' &&
          steps.baseline-check.outputs.has_baseline == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/format_benchmark_comparison.py \
            --baseline '.benchmarks/**/*_main.json' \
            --pr '.benchmarks/**/*_pr-*.json' \
            > benchmark_report.md

          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          COMMENT_ID=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("<!-- lazycogs-benchmark-comparison -->")) | .id' \
            | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" \
              -X PATCH -f body="$(cat benchmark_report.md)"
          else
            gh api "repos/$REPO/issues/$PR/comments" \
              -X POST -f body="$(cat benchmark_report.md)"
          fi

      - name: Run benchmarks (PR — no baseline, informational only)
        if: >
          github.event_name == 'pull_request' &&
          steps.baseline-check.outputs.has_baseline == 'false'
        run: |
          uv run pytest tests/benchmarks/ \
            --benchmark-enable \
            --benchmark-save=pr-${{ github.sha }} \
            --benchmark-storage=.benchmarks \
            -v
